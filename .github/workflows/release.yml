name: Build Release
on:
  push:
    tags:
      - "v*"
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --uac-admin --icon=assets/app.ico --add-data "assets/app.ico;assets" --name SteamMussarelos main.py
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/SteamMussarelos.exe